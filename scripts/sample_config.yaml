# Public example configuration for GitHub.
# Copy to scripts/config.local.yaml or another ignored file before adding
# personal topics, contact email, or publisher API settings.

keywords:
  - ultrasound imaging
  - medical image analysis
  - machine learning

# Hard-filter journals after discovery. Leave empty to search all journals.
journals: []

# Ranking boost only. These do not exclude other relevant papers.
priority_journals:
  - Nature
  - Science
  - Cell
  - Nature Biomedical Engineering
  - Nature Methods
  - IEEE Transactions on Medical Imaging
  - Medical Image Analysis
  - Radiology

exclude_keywords:
  - conference abstract
  - correction
  - erratum

days_back: 1
max_papers: 10
output_dir: reports

sources:
  - pubmed
  - arxiv
  - crossref
  - openalex
  # Optional API-key sources. Uncomment only after setting .env or shell variables.
  # - scopus
  # - elsevier
  # - springer

include_abstracts: true
# Try to retrieve full text for selected papers after ranking. The default
# implemented retriever is Elsevier Article Retrieval and requires entitlement.
include_full_text: true
full_text_sources:
  - elsevier
full_text_dirname: full-text
full_text_max_chars: 60000
full_text_min_chars: 1200
full_text_max_papers: 10
include_scholarly_scaffold: true
# Per-paper visual interpretation is the default "visual report" mode.
# It adds a grounded Mermaid logic diagram and figure-selection notes to each paper.
include_visuals: true
include_per_paper_visuals: true
# Optional global overview charts; keep off by default because they do not replace
# per-paper visual explanation.
include_overview_visuals: false
visuals_dirname: assets
timeout_seconds: 20
max_candidates_per_source: 40

# Public default. Put a contact email in .env via LITERATURE_DIGEST_USER_AGENT.
user_agent: "literature-daily-digest/1.0"
user_agent_env: LITERATURE_DIGEST_USER_AGENT
elsevier_api_key_env: ELSEVIER_API_KEY
elsevier_insttoken_env: ELSEVIER_INSTTOKEN
elsevier_no_proxy: true
scopus_search_view: STANDARD
scopus_enrich_abstracts: true
scopus_abstract_view: META_ABS
elsevier_sciencedirect_view: COMPLETE
elsevier_article_retrieval_view: FULL
elsevier_article_retrieval_accept: text/xml
springer_api_key_env: SPRINGER_NATURE_API_KEY
